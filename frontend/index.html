<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Incident Management System</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header>
      <div>
        <h1>Incident Management System</h1>
        <p>Live operations dashboard for distributed stack failures</p>
      </div>
      <button id="simulate">Simulate outage</button>
    </header>
    <main>
      <section class="incident-list">
        <div class="section-title">
          <h2>Active feed</h2>
          <span id="health">checking...</span>
        </div>
        <div id="incidents"></div>
      </section>
      <section class="detail">
        <div class="section-title">
          <h2>Incident detail</h2>
          <span id="selected">none selected</span>
        </div>
        <div id="detailBody" class="empty">Select an incident to inspect raw signals and submit RCA.</div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
